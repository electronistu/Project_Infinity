

# ============================================================
# CONDITION & UTILITY SPELLS
# ============================================================
# These spells apply conditions, buffs, or use HP-pool mechanics
# rather than dealing traditional damage.
#
# hp_pool: true — Dice determine a hit-point pool (Sleep, Color Spray)
# condition: The status effect applied (e.g. Sleep, Paralyzed)
# condition_duration: How long the condition lasts
# requires_concentration: Whether the spell requires concentration

- name: Sleep
  level: 1
  school: enchantment
  attack_type: automatic
  damage_dice: 5d8
  damage_modifier: 0
  damage_type: ""
  hp_pool: true
  aoe: true
  higher_levels: "+2d8"
  condition: Sleep
  condition_duration: "1 minute"
  requires_concentration: false
  description: |
    Roll 5d8; the total is how many hit points of creatures this spell can affect.
    Creatures within 20 feet of a point you choose are affected in ascending order
    of their current HP (lowest first), subtracting each creature's HP from the pool.
    Subtract each affected creature's HP from the pool until it is exhausted.
    Affected creatures fall unconscious. They awaken if they take damage,
    or if someone uses an action to shake or slap them.

- name: Color Spray
  level: 1
  school: illusion
  attack_type: automatic
  damage_dice: 6d10
  damage_modifier: 0
  damage_type: ""
  hp_pool: true
  aoe: true
  higher_levels: "+2d10"
  condition: Blinded
  condition_duration: "1 round"
  requires_concentration: false
  description: |
    Roll 6d10; the total is how many hit points of creatures this spell can affect.
    Creatures in a 15-foot cone are affected in ascending order of their current HP
    (lowest first). Each affected creature is blinded until the end of your next turn.
    Subtract each creature's HP from the pool until it is exhausted.

- name: Hypnotic Pattern
  level: 3
  school: illusion
  attack_type: saving_throw
  save_type: wis
  save_half: false
  damage_dice: 0d0
  damage_modifier: 0
  damage_type: ""
  no_damage: true
  aoe: true
  condition: Charmed (Incapacitated)
  condition_duration: "Concentration, up to 1 minute"
  requires_concentration: true
  description: |
    You create a twisting pattern of colors that weaves through the air inside a
    30-foot cube. Each creature in the area who can see the pattern must make a
    Wisdom saving throw. On a failed save, the creature becomes charmed for the
    duration. While charmed by this spell, the creature is incapacitated and has a
    speed of 0, but is not restrained.

- name: Hold Person
  level: 2
  school: enchantment
  attack_type: saving_throw
  save_type: wis
  save_half: false
  damage_dice: 0d0
  damage_modifier: 0
  damage_type: ""
  no_damage: true
  higher_levels: "+1 target"
  condition: Paralyzed
  condition_duration: "Concentration, up to 1 minute"
  requires_concentration: true
  description: |
    Choose a humanoid that you can see within range. The target must succeed on a
    Wisdom saving throw or be paralyzed for the duration. At the end of each of
    its turns, the target can make another Wisdom saving throw.
    When you cast this spell using a spell slot of 3rd level or higher, you can
    target one additional humanoid for each slot level above 2nd.

- name: Command
  level: 1
  school: enchantment
  attack_type: saving_throw
  save_type: wis
  save_half: false
  damage_dice: 0d0
  damage_modifier: 0
  damage_type: ""
  no_damage: true
  higher_levels: "+1 target"
  condition: Commanded
  condition_duration: "1 round"
  requires_concentration: false
  description: |
    You speak a one-word command to a creature you can see within range.
    The target must succeed on a Wisdom saving throw or follow the command on its
    next turn. Commands like "Approach", "Drop", "Flee", "Grovel", or "Halt".
    The spell has no effect on undead, creatures that don't understand your
    language, or creatures immune to being charmed.

- name: Invisibility
  level: 2
  school: illusion
  attack_type: automatic
  damage_dice: 0d0
  damage_modifier: 0
  damage_type: ""
  no_damage: true
  condition: Invisible
  condition_duration: "Concentration, up to 1 hour"
  requires_concentration: true
  description: |
    A creature you touch becomes invisible until the spell ends.
    Anything the target is wearing or carrying is invisible as long as it is on
    the target's person. The spell ends if the target attacks or casts a spell.

- name: Shield
  level: 1
  school: abjuration
  attack_type: automatic
  damage_dice: 0d0
  damage_modifier: 0
  damage_type: ""
  no_damage: true
  condition: Shielded
  condition_duration: "1 round"
  requires_concentration: false
  description: |
    Cast as a reaction when you are hit by an attack or targeted by the magic
    missile spell. Until the start of your next turn, you have a +5 bonus to AC,
    including against the triggering attack, and you take no damage from
    magic missile.

- name: Misty Step
  level: 2
  school: conjuration
  attack_type: automatic
  damage_dice: 0d0
  damage_modifier: 0
  damage_type: ""
  no_damage: true
  condition: Teleported
  condition_duration: "Instant"
  requires_concentration: false
  description: |
    Briefly surrounded by silvery mist, you teleport up to 30 feet to an
    unoccupied space that you can see.

- name: Counterspell
  level: 3
  school: abjuration
  attack_type: automatic
  damage_dice: 0d0
  damage_modifier: 0
  damage_type: ""
  no_damage: true
  condition: Spell Interrupted
  condition_duration: "Instant"
  requires_concentration: false
  description: |
    Cast as a reaction when you see a creature within 60 feet of you casting a
    spell. You attempt to interrupt the casting. If the spell is 3rd level or lower,
    it fails and has no effect. For higher-level spells, make an ability check
    using your spellcasting ability. The DC equals 10 + the spell's level.
    On a success, the creature's spell fails.

- name: Mirror Image
  level: 2
  school: illusion
  attack_type: automatic
  damage_dice: 0d0
  damage_modifier: 0
  damage_type: ""
  no_damage: true
  condition: Illusory Duplicates
  condition_duration: "1 minute"
  requires_concentration: false
  description: |
    Three illusory duplicates of yourself appear in your space. Until the spell
    ends, each time a creature targets you with an attack or a harmful spell,
    roll a d20 to determine whether the target instead hits one of your duplicates.
    A duplicate's AC equals 10 + your Dexterity modifier. If an attack hits a
    duplicate, the duplicate is destroyed.

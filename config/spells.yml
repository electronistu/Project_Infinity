# D&D 5e Combat Spells (SRD)
#
# attack_type values:
#   attack_roll  — d20 + spell_attack_modifier vs target AC. Crits double base dice.
#   saving_throw — target rolls save vs caster's spell_save_dc. Half/no damage on success.
#   automatic    — always hits, no roll to land. Just roll damage.
#
# cantrip_scaling: if true, damage dice scale at character levels 5, 11, 17.
#   Example: Fire Bolt does 1d10 at levels 1-4, 2d10 at 5-10, 3d10 at 11-16, 4d10 at 17+.
#
# higher_levels: damage scaling per slot level above native. Format: "+XdY" or "+XdY+Z".
#   Example: Fireball is 6d6 at level 3, "+1d6" means 7d6 at level 4, 8d6 at level 5, etc.
#
# save_half: true = half damage on successful save; false = no damage on successful save.


# D&D 5e Spells (SRD + Iconic Extras)
#
# Fields:
#   level:              Spell level (0 = cantrip)
#   school:             School of magic
#   attack_type:        "attack_roll" | "saving_throw" | "automatic"
#   damage_dice:        Base damage dice (e.g. "3d6").  "0d0" = no dice rolled.
#   damage_modifier:    Flat bonus added to damage / healing
#   damage_type:        "fire", "cold", "lightning", "healing", etc.
#   save_type:          Abilities: str, dex, con, int, wis, cha
#   save_half:          true = half on save, false = no damage on save
#   cantrip_scaling:    If true, base dice multiplies at levels 5, 11, 17
#   cantrip_scale_dice: The single-die notation to scale (e.g. "1d8")
#   higher_levels:      Scaling per slot above native. "+XdY", "+XdY+Z", "+N"
#   aoe:                true = affects an area
#   aoe_shape:          "sphere" | "cone" | "line" | "cube" | "cylinder"
#   aoe_size:           Human-readable (e.g. "20-foot radius")
#   duration:           How long effects last. "Instantaneous", "1 minute", etc.
#   requires_concentration: true if concentration is required
#   ritual:             true = can be cast as a ritual (no slot consumed)
#   healing:            true = dice heal instead of damaging
#   flat_healing:       true = value is flat (not rolled) for Heal, etc.
#   hp_pool:            true = dice total = HP pool (Sleep, Color Spray)
#   condition:          Status effect applied on failure (e.g. "Charmed")
#   condition_duration: How long the condition lasts
#   no_damage:          true = spell deals zero numeric damage
#   instant_kill:       true = kills instantly on failed save (Power Word Kill)
#   instant_kill_hp_threshold: Max HP for instant kill to work
#   damage_on_miss:     Dice notation for partial damage on miss (e.g. "2d4")
#   multi_hit:          true = spell makes multiple separate attack rolls
#   is_supplementary:   true = modifies a subsequent weapon attack (smites, etc.)
#   buffs:              Dict of stat changes the engine can auto-apply
#       armor_class:        e.g. "+5" (Shield), "13 + DEX" (Mage Armor)
#       attack_rolls:       e.g. "+1d4" (Bless)
#       saving_throws:      e.g. "+1d4" (Bless)
#       damage_rolls:       e.g. "+1d4" (Divine Favor)
#       hp_temporary:       e.g. "1d4+4" (False Life)
#       speed:              e.g. "+10" (Longstrider)
#       damage_resistance:  e.g. "fire" (Absorb Elements)
#       condition_immunity: e.g. "frightened" (Heroism)


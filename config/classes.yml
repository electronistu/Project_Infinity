- name: Fighter
  hit_die: 10
  saving_throw_proficiencies:
    - Strength
    - Constitution
  armor_proficiencies:
    - "All armor"
    - "Shields"
  weapon_proficiencies:
    - "Simple weapons"
    - "Martial weapons"
  tool_proficiencies: []
  skills:
    choices: ["Acrobatics", "Animal Handling", "Athletics", "History", "Insight", "Intimidation", "Perception", "Survival"]
    number: 2
  features:
    - name: Fighting Style
      level: 1
      description: "You adopt a particular style of fighting as your specialty."
    - name: Second Wind
      level: 1
      description: "You have a limited well of stamina that you can draw on to protect yourself from harm. You can use a bonus action to regain hit points equal to 1d10 + your fighter level. You regain the use of this feature after a short or long rest."
    - name: Action Surge
      level: 2
      description: "You can push yourself beyond your normal limits for a moment. On your turn, you can take one additional action. You regain the use of this feature after a short or long rest."
  fighting_styles:
    - name: Archery
      description: "You gain a +2 bonus to attack rolls you make with ranged weapons."
    - name: Defense
      description: "While you are wearing armor, you gain a +1 bonus to AC."
    - name: Dueling
      description: "When you are wielding a melee weapon in one hand and no other weapons, you gain a +2 bonus to damage rolls with that weapon."
    - name: Great Weapon Fighting
      description: "When you roll a 1 or 2 on a damage die for an attack you make with a melee weapon that you are wielding with two hands, you can reroll the die and must use the new roll."
    - name: Protection
      description: "When a creature you can see attacks a target other than you that is within 5 feet of you, you can use your reaction to impose disadvantage on the attack roll."
    - name: Two-Weapon Fighting
      description: "When you engage in two-weapon fighting, you can add your ability modifier to the damage of the second attack."
  starting_equipment_options:
    - choose_one_from:
        - "Chain Mail"
        - "Leather Tunic, Longbow, 20 Arrows"
    - choose_one_from:
        - "Longsword, Shield"
        - "Two Handaxes"
    - choose_one_from:
        - "Light Crossbow, 20 Bolts"
        - "Two Handaxes"
    - choose_one_from:
        - "Dungeoneer's Pack"
        - "Explorer's Pack"
  starting_gold_dice: "4d4"

- name: Monk
  hit_die: 8
  saving_throw_proficiencies:

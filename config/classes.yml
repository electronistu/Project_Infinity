- name: Artificer
  hit_die: 8
  saving_throw_proficiencies:
    - Constitution
    - Intelligence
  armor_proficiencies:
    - "Light armor"
    - "Medium armor"
    - "Shields"
  weapon_proficiencies:
    - "Simple weapons"
  tool_proficiencies:
    - "Thieves' Tools"
    - "Tinker's Tools"
  tool_proficiency_choices:
    choose_one_from:
      - "Artisan's Tools (one type of your choice)"
    number: 1
  skills:
    choices: ["Arcana", "History", "Investigation", "Medicine", "Nature", "Perception", "Sleight of Hand"]
    number: 2
  features:
    - name: Magical Tinkering
      level: 1
      description: "You learn to imbue a tiny nonmagical object with a magical property."
    - name: Spellcasting
      level: 1
      description: "Your magic is channeled through objects and tools. Intelligence is your spellcasting ability."
  starting_equipment_options:
    - choose_one_from:
        - "Any Two Simple Weapons"
    - fixed_items:
        - "Light Crossbow"
        - "20 Bolts"
    - choose_one_from:
        - "Studded Leather Tunic"
        - "Scale Mail"
    - fixed_items:
        - "Thieves' Tools"
        - "Tinker's Tools"
    - fixed_items:
        - "Dungeoneer's Pack"
  starting_gold_dice: "4d4"


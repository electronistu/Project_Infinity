- name: Elf
  speed: 30
  ability_score_increases:
    - ability: Dexterity
      value: 2
  languages:
    - Common
    - Elvish
  traits:
    - name: Darkvision
      description: "Accustomed to twilit forests and the night sky, you have superior vision in dark and dim conditions. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light."
    - name: Fey Ancestry
      description: "You have advantage on saving throws against being charmed, and magic can't put you to sleep."
    - name: Trance
      description: "Elves don't need to sleep. Instead, they meditate deeply, remaining semiconscious, for 4 hours a day."
  proficiencies:
    - type: skill
      name: Perception
  subraces:
    - name: High Elf
      ability_score_increases:
        - ability: Intelligence
          value: 1
      traits:
        - name: Elf Weapon Training
          description: "You have proficiency with the longsword, shortsword, shortbow, and longbow."
        - name: Cantrip
          description: "You know one cantrip of your choice from the wizard spell list. Intelligence is your spellcasting ability for it."
      proficiencies:
        - type: weapon
          name: Longsword
        - type: weapon
          name: Shortsword
        - type: weapon
          name: Shortbow
        - type: weapon
          name: Longbow
      languages:
        - "One extra language of your choice"
    - name: Wood Elf
      ability_score_increases:
        - ability: Wisdom
          value: 1
      traits:
        - name: Elf Weapon Training
          description: "You have proficiency with the longsword, shortsword, shortbow, and longbow."
        - name: Fleet of Foot
          description: "Your base walking speed increases to 35 feet."
        - name: Mask of the Wild
          description: "You can attempt to hide even when you are only lightly obscured by foliage, heavy rain, falling snow, mist, or other natural phenomena."
      proficiencies:
        - type: weapon
          name: Longsword
        - type: weapon
          name: Shortsword
        - type: weapon
          name: Shortbow
        - type: weapon
          name: Longbow
      languages: []


- name: Dwarf
  speed: 25
  ability_score_increases:
    - ability: Constitution
      value: 2
  languages:
    - Common
    - Dwarvish
  traits:
    - name: Darkvision
      description: "Accustomed to life underground, you have superior vision in dark and dim conditions. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light."
    - name: Dwarven Resilience
      description: "You have advantage on saving throws against poison, and you have resistance against poison damage."
    - name: Stonecunning
      description: "Whenever you make an Intelligence (History) check related to the origin of stonework, you are considered proficient in the History skill and add double your proficiency bonus to the check."
  proficiencies:
    - type: weapon
      name: Battleaxe
    - type: weapon
      name: Handaxe
    - type: weapon
      name: Light Hammer
    - type: weapon
      name: Warhammer
  subraces:
    - name: Hill Dwarf
      ability_score_increases:
        - ability: Wisdom
          value: 1
      traits:
        - name: Dwarven Toughness
          description: "Your hit point maximum increases by 1, and it increases by 1 every time you gain a level."
      proficiencies:
        - type: tool
          name: "Artisan's Tools (one of your choice)"
      languages: []
    - name: Mountain Dwarf
      ability_score_increases:
        - ability: Strength
          value: 2
      traits:
        - name: Dwarven Armor Training
          description: "You have proficiency with light and medium armor."
      proficiencies:
        - type: armor
          name: "Light armor"
        - type: armor
          name: "Medium armor"
        - type: tool
          name: "Artisan's Tools (one of your choice)"
      languages: []

- name: Halfling
  speed: 25
  ability_score_increases:
    - ability: Dexterity
      value: 2
  languages:
    - Common
    - Halfling
  traits:
    - name: Lucky
      description: "When you roll a 1 on an attack roll, ability check, or saving throw, you can reroll the die and must use the new roll."
    - name: Brave
      description: "You have advantage on saving throws against being frightened."
    - name: Halfling Nimbleness
      description: "You can move through the space of any creature that is of a size larger than yours."
  proficiencies: []
  subraces:
    - name: Lightfoot
      ability_score_increases:
        - ability: Charisma
          value: 1
      traits:
        - name: Naturally Stealthy
          description: "You can attempt to hide even when you are obscured only by a creature that is at least one size larger than you."
      proficiencies: []
      languages: []


- name: Dragonborn
  speed: 30
  ability_score_increases:
    - ability: Strength
      value: 2
    - ability: Charisma
      value: 1
  languages:
    - Common
    - Draconic
  traits:
    - name: Draconic Ancestry
      description: "You choose one type of dragon as your ancestor. Your breath weapon and damage resistance are determined by the dragon type, as shown in the Draconic Ancestry table."
    - name: Breath Weapon
      description: "You can use your action to exhale destructive energy. Your Draconic Ancestry determines the size, shape, and damage type of the exhalation. When you use your breath weapon, each creature in the area must make a saving throw. The DC equals 8 + your Constitution modifier + your proficiency bonus. A creature takes 2d6 damage on a failed save, and half as much damage on a successful one. The damage increases to 3d6 at 6th level, 4d6 at 11th, and 5d6 at 16th level."
    - name: Damage Resistance
      description: "You have resistance to the damage type associated with your Draconic Ancestry."
  proficiencies: []
  subraces: []